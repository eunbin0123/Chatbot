<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서초구립 양재노인종합복지관 - 전체화면</title>
    <style>
        /* 브라우저 기본 여백 제거 및 스크롤 방지 */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* 전체 페이지 스크롤 방지 */
        }

        /* iframe을 화면 전체 크기로 설정 */
        .fullscreen-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe 
        src="https://www.seochosenior.org/bbs/content.php?co_id=value" 
        class="fullscreen-iframe"
        title="복지관의 가치 전체화면">
    </iframe>

</body>
</html>
